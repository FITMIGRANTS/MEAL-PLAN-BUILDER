<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Plan Builder — Alejandro Serrano Coaching</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;color:#1a1a1a;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:16px}
.header{background:#FF6B1A;color:#fff;padding:16px 20px;border-radius:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:12px;opacity:.8;margin-top:2px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.client-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1.5fr 1.5fr;gap:8px;margin-bottom:12px}
.field label{font-size:10px;color:#888;font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;font-size:13px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;background:#fafafa;color:#1a1a1a;outline:none}
.field input:focus,.field select:focus{border-color:#FF6B1A;background:#fff}
.targets-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.target-item{background:#fafafa;border:1px solid #e8e8e8;border-radius:8px;padding:10px}
.target-item label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.target-item input{width:100%;font-size:18px;font-weight:600;border:none;background:transparent;text-align:center;outline:none;color:#1a1a1a}
.controls{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ctrl-label{font-size:13px;color:#666}
.ctrl-select{font-size:13px;padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;cursor:pointer}
.meal-block{background:#fff;border-radius:12px;margin-bottom:12px;overflow:visible;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.meal-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-radius:12px 12px 0 0}
.meal-header h2{font-size:14px;font-weight:600;color:#fff}
.meal-header-right{display:flex;align-items:center;gap:10px}
.meal-header label{font-size:11px;color:rgba(255,255,255,.8)}
.meal-header input{width:80px;font-size:14px;font-weight:600;padding:4px 8px;border:1px solid rgba(255,255,255,.4);border-radius:6px;background:rgba(255,255,255,.2);color:#fff;text-align:center;outline:none}
.meal-header input::placeholder{color:rgba(255,255,255,.5)}
.section-sep{padding:8px 16px;display:flex;align-items:center;gap:8px;background:#f8f8f8;border-top:1px solid #f0f0f0}
.section-badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#fff;padding:3px 10px;border-radius:20px}
.col-header-row{display:grid;gap:5px;padding:5px 16px;border-bottom:1px solid #f0f0f0}
.ch-grid{grid-template-columns:26px 1fr 58px 52px 52px 52px 52px 70px}
.col-h{font-size:10px;color:#aaa;text-align:center;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.col-h:nth-child(2){text-align:left}
.option-row{display:grid;gap:5px;padding:5px 16px;align-items:center}
.opt-grid{grid-template-columns:26px 1fr 58px 52px 52px 52px 52px 70px}
.opt-label{font-size:11px;font-weight:700;text-align:center;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff}
.food-wrap{position:relative}
.food-input{width:100%;font-size:12px;padding:5px 8px;border:1px solid #e8e8e8;border-radius:6px;background:#fafafa;outline:none;color:#1a1a1a}
.food-input:focus{border-color:#FF6B1A;background:#fff}
.qty-input{width:100%;font-size:12px;padding:5px 6px;border:1px solid #e8e8e8;border-radius:6px;background:#fafafa;text-align:center;outline:none;color:#1a1a1a}
.qty-input:focus{border-color:#FF6B1A;background:#fff}
.macro-val{font-size:12px;text-align:center;color:#ccc}
.macro-val.filled{font-weight:600;color:#1a1a1a}
.autocomplete{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:8px;z-index:1000;max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.ac-item{padding:7px 12px;font-size:12px;cursor:pointer;color:#1a1a1a;border-bottom:1px solid #f5f5f5}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:#fff5f0}
.auto-btn{font-size:10px;padding:4px 8px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;color:#666;cursor:pointer;white-space:nowrap;font-weight:500}
.auto-btn:hover{border-color:#FF6B1A;color:#FF6B1A;background:#fff5f0}
.avg-row{display:grid;gap:5px;padding:6px 16px;align-items:center;background:#f8f8f8;border-top:1px solid #f0f0f0}
.summary{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-top:8px}
.summary h3{font-size:14px;font-weight:600;margin-bottom:12px}
.summary-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px}
.sh{font-size:10px;color:#999;text-align:center;font-weight:600;text-transform:uppercase;padding:3px 0;letter-spacing:.3px}
.sh:first-child{text-align:left}
.sv{font-size:13px;text-align:center;padding:5px 0;border-bottom:1px solid #f5f5f5}
.sv:first-child{text-align:left;font-weight:600}
.sv.kcal{color:#FF6B1A;font-weight:600}
.sv.prot{color:#1A5276}
.sv.carb{color:#1E6B3A}
.sv.fat{color:#6C3483}
.total-row .sv{font-weight:700;font-size:14px;border-bottom:none;border-top:1px solid #e8e8e8;padding-top:8px}
.diff-row .sv{font-size:12px;border-bottom:none}
.diff-pos{color:#A93226!important;font-weight:600!important}
.diff-neg{color:#1E6B3A!important;font-weight:600!important}
.diff-zero{color:#999!important}
@media(max-width:768px){
.client-grid{grid-template-columns:1fr 1fr;gap:6px}
.targets-row{grid-template-columns:1fr 1fr}
.ch-grid,.opt-grid,.avg-row{grid-template-columns:22px 1fr 50px 44px 44px 44px 44px 60px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Alejandro Serrano Coaching</h1>
      <p>Meal Plan Builder — internal tool</p>
    </div>
  </div>

  <div class="card">
    <div class="client-grid">
      <div class="field"><label>Client name</label><input id="cName" placeholder="Nathaniel Fletcher"></div>
      <div class="field"><label>Age</label><input id="cAge" type="number" placeholder="30"></div>
      <div class="field"><label>Weight (kg)</label><input id="cWeight" type="number" placeholder="85"></div>
      <div class="field"><label>Height (cm)</label><input id="cHeight" type="number" placeholder="175"></div>
      <div class="field"><label>Goal</label><input id="cGoal" placeholder="Fat Loss"></div>
      <div class="field"><label>Supermarket</label>
        <select id="supermarket" onchange="renderMeals()">
          <option value="WOOLWORTHS">Woolworths</option>
          <option value="COLES">Coles</option>
          <option value="ALDI">Aldi</option>
        </select>
      </div>
    </div>
    <div class="targets-row">
      <div class="target-item"><label style="color:#FF6B1A">Daily kcal</label><input id="tKcal" type="number" placeholder="2000" oninput="updateSummary()"></div>
      <div class="target-item"><label style="color:#1A5276">Protein (g)</label><input id="tProt" type="number" placeholder="150" oninput="updateSummary()"></div>
      <div class="target-item"><label style="color:#1E6B3A">Carbs (g)</label><input id="tCarbs" type="number" placeholder="200" oninput="updateSummary()"></div>
      <div class="target-item"><label style="color:#6C3483">Fat (g)</label><input id="tFat" type="number" placeholder="65" oninput="updateSummary()"></div>
    </div>
    <div class="controls">
      <span class="ctrl-label">Number of meals:</span>
      <select class="ctrl-select" id="numMeals" onchange="setMeals(this.value)">
        <option value="3">3 meals</option>
        <option value="4" selected>4 meals</option>
        <option value="5">5 meals</option>
      </select>
    </div>
  </div>

  <div id="meals-container"></div>
  <div id="daily-summary"></div>
</div>

const MEAL_NAMES = ['Breakfast','Lunch','Snack','Dinner','Meal 5'];
const MEAL_TIMES = ['~8:00 AM','~1:00 PM','~4:30 PM','~8:00 PM','TBD'];
const MEAL_COLORS = ['#1A5276','#1E6B3A','#B7950B','#A93226','#6C3483'];
const MEAL_LIGHTS = ['#EAF4FB','#EAF7ED','#FEFCE8','#FDF2F1','#F5EEF8'];
const SECTION_CATS = {carbs:'CARBOS',protein:'PROTEÍNAS',fat:'GRASAS'};
const SECTION_COLORS = {carbs:'#1E6B3A',protein:'#1A5276',fat:'#6C3483'};
const SECTION_LABELS = {carbs:'Carbs options',protein:'Protein options',fat:'Fat options'};

let numMeals = 4;
let mealData = [];

function getSupermarket(){return document.getElementById('supermarket').value}
function getDB(){return FOOD_DB.filter(f=>f.supermarket===getSupermarket())}
function findFood(name){if(!name)return null;return getDB().find(f=>f.name.trim()===name.trim())||null}
function calcMacros(food,qty){
  if(!food||!qty)return{kcal:0,protein:0,fat:0,carbs:0};
  const q=parseFloat(qty)||0;
  return{
    kcal:Math.round(food.kcal/100*q*10)/10,
    protein:Math.round(food.protein/100*q*10)/10,
    fat:Math.round(food.fat/100*q*10)/10,
    carbs:Math.round(food.carbs/100*q*10)/10
  };
}

function suggestEquivalents(foodName,qty,section,mi,oi){
  const sourceFood=findFood(foodName);
  if(!sourceFood||!qty)return;
  const q=parseFloat(qty);
  const targetKcal=sourceFood.kcal/100*q;
  const cat=SECTION_CATS[section];
  const candidates=getDB().filter(f=>f.category===cat&&f.name!==foodName&&f.kcal>0);
  const ranked=candidates.map(f=>{
    const sq=Math.round(targetKcal/f.kcal*100);
    return{food:f,qty:sq,diff:Math.abs(f.kcal/100*sq-targetKcal)};
  }).sort((a,b)=>a.diff-b.diff).slice(0,4);
  const usedNames=mealData[mi][section].filter((_,i)=>i!==oi).map(o=>o.food).filter(Boolean);
  const filtered=ranked.filter(r=>!usedNames.includes(r.food.name));
  let filled=0;
  for(let i=0;i<5;i++){
    if(i===oi)continue;
    if(filled<filtered.length){
      const sug=filtered[filled];
      mealData[mi][section][i]={food:sug.food.name,qty:sug.qty};
      filled++;
    }
  }
  renderMeals();
}

function initMealData(){
  mealData=Array.from({length:5},()=>({
    kcalTarget:'',
    carbs:Array(5).fill(null).map(()=>({food:'',qty:''})),
    protein:Array(5).fill(null).map(()=>({food:'',qty:''})),
    fat:Array(5).fill(null).map(()=>({food:'',qty:''})),
  }));
}

function setMeals(n){numMeals=parseInt(n);renderMeals()}

function renderMeals(){
  const container=document.getElementById('meals-container');
  let html='';
  for(let mi=0;mi<numMeals;mi++){
    const mc=MEAL_COLORS[mi];
    const ml=MEAL_LIGHTS[mi];
    const md=mealData[mi];
    html+=`<div class="meal-block">
      <div class="meal-header" style="background:${mc}">
        <h2>${MEAL_NAMES[mi]} &middot; ${MEAL_TIMES[mi]}</h2>
        <div class="meal-header-right">
          <label>kcal target</label>
          <input type="number" placeholder="500" value="${md.kcalTarget}"
            onchange="mealData[${mi}].kcalTarget=this.value;updateSummary()">
        </div>
      </div>`;
    ['carbs','protein','fat'].forEach(section=>{
      const sc=SECTION_COLORS[section];
      html+=`<div class="section-sep">
        <span class="section-badge" style="background:${sc}">${SECTION_LABELS[section]}</span>
      </div>
      <div class="col-header-row ch-grid">
        <span class="col-h">Opt</span>
        <span class="col-h" style="text-align:left">Food</span>
        <span class="col-h">g</span>
        <span class="col-h" style="color:#FF6B1A">kcal</span>
        <span class="col-h" style="color:#1A5276">prot</span>
        <span class="col-h" style="color:#1E6B3A">carbs</span>
        <span class="col-h" style="color:#6C3483">fat</span>
        <span class="col-h"></span>
      </div>`;
      md[section].forEach((opt,oi)=>{
        const food=findFood(opt.food);
        const macros=food?calcMacros(food,opt.qty):null;
        const bg=oi%2===0?'#fff':'#fafafa';
        const optLabel=String.fromCharCode(65+oi);
        const hasData=food&&opt.qty;
        html+=`<div class="option-row opt-grid" style="background:${bg}">
          <span class="opt-label" style="background:${sc};font-size:11px">${optLabel}</span>
          <div class="food-wrap">
            <input class="food-input" placeholder="Search food..." value="${opt.food.replace(/"/g,'&quot;')}"
              data-mi="${mi}" data-section="${section}" data-oi="${oi}"
              oninput="handleFoodInput(this)"
              onblur="hideAC(this)">
            <div class="autocomplete" id="ac-${mi}-${section}-${oi}" style="display:none"></div>
          </div>
          <input class="qty-input" type="number" placeholder="g" value="${opt.qty}"
            onchange="mealData[${mi}]['${section}'][${oi}].qty=this.value;renderMeals()">
          <div class="macro-val ${hasData?'filled':''}">
            ${macros?`<span style="color:#FF6B1A">${macros.kcal}</span>`:'—'}
          </div>
          <div class="macro-val ${hasData?'filled':''}">
            ${macros?`<span style="color:#1A5276">${macros.protein}</span>`:'—'}
          </div>
          <div class="macro-val ${hasData?'filled':''}">
            ${macros?`<span style="color:#1E6B3A">${macros.carbs}</span>`:'—'}
          </div>
          <div class="macro-val ${hasData?'filled':''}">
            ${macros?`<span style="color:#6C3483">${macros.fat}</span>`:'—'}
          </div>
          <div>
            ${oi===0&&opt.food&&opt.qty?
              `<button class="auto-btn" onclick="suggestEquivalents('${opt.food.replace(/'/g,"\'")}','${opt.qty}','${section}',${mi},${oi})">Auto-fill</button>`:
              ''}
          </div>
        </div>`;
      });
      const filled=md[section].filter(o=>findFood(o.food)&&o.qty);
      const avg=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):'—';
      const aKcal=filled.map(o=>calcMacros(findFood(o.food),o.qty).kcal);
      const aProt=filled.map(o=>calcMacros(findFood(o.food),o.qty).protein);
      const aCarbs=filled.map(o=>calcMacros(findFood(o.food),o.qty).carbs);
      const aFat=filled.map(o=>calcMacros(findFood(o.food),o.qty).fat);
      html+=`<div class="avg-row opt-grid" style="background:${ml}">
        <span></span>
        <span style="font-size:10px;color:#999;font-style:italic;text-align:right">avg per option &rarr;</span>
        <span></span>
        <span style="font-size:11px;font-weight:600;color:#FF6B1A;text-align:center">${avg(aKcal)}</span>
        <span style="font-size:11px;font-weight:600;color:#1A5276;text-align:center">${avg(aProt)}</span>
        <span style="font-size:11px;font-weight:600;color:#1E6B3A;text-align:center">${avg(aCarbs)}</span>
        <span style="font-size:11px;font-weight:600;color:#6C3483;text-align:center">${avg(aFat)}</span>
        <span></span>
      </div>`;
    });
    html+=`</div>`;
  }
  container.innerHTML=html;
  updateSummary();
}

function handleFoodInput(input){
  const mi=parseInt(input.dataset.mi);
  const section=input.dataset.section;
  const oi=parseInt(input.dataset.oi);
  const val=input.value.trim().toUpperCase();
  const acEl=document.getElementById(`ac-${mi}-${section}-${oi}`);
  mealData[mi][section][oi].food=input.value;
  if(val.length<2){acEl.style.display='none';return}
  const cat=SECTION_CATS[section];
  const matches=getDB().filter(f=>f.category===cat&&f.name.toUpperCase().includes(val)).slice(0,8);
  if(!matches.length){acEl.style.display='none';return}
  acEl.innerHTML=matches.map(f=>`<div class="ac-item" onmousedown="selectFood('${f.name.replace(/'/g,"\'")}',${mi},'${section}',${oi})">${f.name}</div>`).join('');
  acEl.style.display='block';
}

function selectFood(name,mi,section,oi){
  mealData[mi][section][oi].food=name;
  renderMeals();
}

function hideAC(input){
  setTimeout(()=>{
    const ac=document.getElementById(`ac-${input.dataset.mi}-${input.dataset.section}-${input.dataset.oi}`);
    if(ac)ac.style.display='none';
  },200);
}

function updateSummary(){
  let rows='',totalK=0,totalP=0,totalC=0,totalF=0,count=0;
  for(let mi=0;mi<numMeals;mi++){
    const md=mealData[mi];
    const allOpts=['carbs','protein','fat'].flatMap(s=>md[s]);
    const filled=allOpts.filter(o=>findFood(o.food)&&o.qty);
    if(!filled.length)continue;
    const aK=filled.reduce((s,o)=>s+calcMacros(findFood(o.food),o.qty).kcal,0)/filled.length;
    const aP=filled.reduce((s,o)=>s+calcMacros(findFood(o.food),o.qty).protein,0)/filled.length;
    const aC=filled.reduce((s,o)=>s+calcMacros(findFood(o.food),o.qty).carbs,0)/filled.length;
    const aF=filled.reduce((s,o)=>s+calcMacros(findFood(o.food),o.qty).fat,0)/filled.length;
    totalK+=aK;totalP+=aP;totalC+=aC;totalF+=aF;count++;
    rows+=`<div class="sv" style="color:${MEAL_COLORS[mi]}">${MEAL_NAMES[mi]}</div>
      <div class="sv kcal">${Math.round(aK)}</div>
      <div class="sv prot">${aP.toFixed(1)}g</div>
      <div class="sv carb">${aC.toFixed(1)}g</div>
      <div class="sv fat">${aF.toFixed(1)}g</div>`;
  }
  if(!count){document.getElementById('daily-summary').innerHTML='';return}
  const tK=parseInt(document.getElementById('tKcal').value)||0;
  const tP=parseInt(document.getElementById('tProt').value)||0;
  const tC=parseInt(document.getElementById('tCarbs').value)||0;
  const tF=parseInt(document.getElementById('tFat').value)||0;
  const dK=tK?Math.round(totalK-tK):null;
  const dP=tP?+(totalP-tP).toFixed(1):null;
  const dC=tC?+(totalC-tC).toFixed(1):null;
  const dF=tF?+(totalF-tF).toFixed(1):null;
  const dc=(v)=>v===null?'diff-zero':v>0?'diff-pos':'diff-neg';
  const ds=(v,u='')=>v===null?'—':(v>0?'+':'')+v+u;
  document.getElementById('daily-summary').innerHTML=`<div class="summary">
    <h3>Daily summary</h3>
    <div class="summary-grid">
      <div class="sh">Meal</div><div class="sh" style="color:#FF6B1A">Kcal</div>
      <div class="sh" style="color:#1A5276">Protein</div>
      <div class="sh" style="color:#1E6B3A">Carbs</div>
      <div class="sh" style="color:#6C3483">Fat</div>
      ${rows}
      <div class="sv total-row">Total</div>
      <div class="sv kcal total-row">${Math.round(totalK)}</div>
      <div class="sv prot total-row">${totalP.toFixed(1)}g</div>
      <div class="sv carb total-row">${totalC.toFixed(1)}g</div>
      <div class="sv fat total-row">${totalF.toFixed(1)}g</div>
      ${tK?`<div class="sv diff-row" style="color:#999;font-style:italic">vs target</div>
        <div class="sv diff-row ${dc(dK)}">${ds(dK)}</div>
        <div class="sv diff-row ${dc(dP)}">${ds(dP,'g')}</div>
        <div class="sv diff-row ${dc(dC)}">${ds(dC,'g')}</div>
        <div class="sv diff-row ${dc(dF)}">${ds(dF,'g')}</div>`:''}
    </div>
  </div>`;
}

initMealData();
renderMeals();
</script>
